<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Usuarios — Admin PeruTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="padding-top: 0;">

<button class="admin-toggle-btn" type="button" onclick="document.querySelector('.admin-sidebar').classList.toggle('open')">
    <i class="bi bi-list"></i>
</button>

<aside class="admin-sidebar">
    <div class="sidebar-header">
        <h5><i class="bi bi-speedometer2 text-warning"></i>PeruTec Admin</h5>
        <small th:text="'Hola, ' + ${nombreUsuario}">Admin</small>
    </div>
    <a class="nav-link-admin" th:href="@{/admin}"><i class="bi bi-house-door"></i> Dashboard</a>
    <a class="nav-link-admin" th:href="@{/admin/productos}"><i class="bi bi-phone"></i> Productos</a>
    <a class="nav-link-admin active" th:href="@{/admin/usuarios}"><i class="bi bi-people"></i> Usuarios</a>
    <a class="nav-link-admin" th:href="@{/admin/ventas}"><i class="bi bi-bag-check"></i> Ventas</a>
    <a class="nav-link-admin" th:href="@{/admin/ventas/excel}"><i class="bi bi-file-earmark-excel"></i> Exportar Excel</a>
    <div class="sidebar-footer">
        <a class="nav-link-admin" th:href="@{/inicio}"><i class="bi bi-shop"></i> Ver tienda</a>
        <a class="nav-link-admin" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
    </div>
</aside>

<main class="admin-main">
    <div class="admin-header">
        <div>
            <h1><i class="bi bi-people me-2"></i>Usuarios</h1>
            <small class="text-muted" th:text="${usuarios.size() + ' usuarios registrados'}">0 usuarios</small>
        </div>
        <a class="btn btn-primary-perutec" th:href="@{/admin/ventas/excel}">
            <i class="bi bi-file-earmark-excel me-1"></i>Exportar Excel
        </a>
    </div>

    <div class="admin-card">
        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th class="text-center">Compras</th>
                    <th class="text-end">Total gastado</th>
                    <th>Última compra</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--gradiente-principal); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem;">
                                <span th:text="${u.nombre != null ? u.nombre.substring(0,1).toUpperCase() : '?'}">?</span>
                            </div>
                            <span class="fw-semibold" th:text="${u.nombre}">Nombre</span>
                        </div>
                    </td>
                    <td th:text="${u.email}">email</td>
                    <td>
                            <span class="badge-rol"
                                  th:classappend="${(u.rol != null and u.rol.equalsIgnoreCase('ADMIN')) ? 'admin' : 'cliente'}"
                                  th:text="${u.rol}">Rol</span>
                    </td>
                    <td class="text-center fw-bold" th:text="${u.cantidadCompras}">0</td>
                    <td class="text-end fw-bold text-primary" th:text="'S/ ' + ${#numbers.formatDecimal(u.totalGastado, 1, 2)}">S/ 0.00</td>
                    <td th:text="${u.ultimaCompra != null ? u.ultimaCompra.toLocalDate().toString() : '—'}">—</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${usuarios.isEmpty()}" class="text-center text-muted py-4">
            <i class="bi bi-inbox d-block mb-2" style="font-size: 2.5rem; opacity: .5;"></i>
            <p class="mb-0">No hay usuarios registrados.</p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
