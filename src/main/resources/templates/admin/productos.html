<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Productos — Admin PeruTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="padding-top: 0;">

<button class="admin-toggle-btn" type="button" onclick="document.querySelector('.admin-sidebar').classList.toggle('open')">
    <i class="bi bi-list"></i>
</button>

<aside class="admin-sidebar">
    <div class="sidebar-header">
        <h5><i class="bi bi-speedometer2 text-warning"></i>PeruTec Admin</h5>
        <small th:text="'Hola, ' + ${nombreUsuario}">Admin</small>
    </div>
    <a class="nav-link-admin" th:href="@{/admin}"><i class="bi bi-house-door"></i> Dashboard</a>
    <a class="nav-link-admin active" th:href="@{/admin/productos}"><i class="bi bi-phone"></i> Productos</a>
    <a class="nav-link-admin" th:href="@{/admin/usuarios}"><i class="bi bi-people"></i> Usuarios</a>
    <a class="nav-link-admin" th:href="@{/admin/ventas}"><i class="bi bi-bag-check"></i> Ventas</a>
    <a class="nav-link-admin" th:href="@{/admin/ventas/excel}"><i class="bi bi-file-earmark-excel"></i> Exportar Excel</a>
    <div class="sidebar-footer">
        <a class="nav-link-admin" th:href="@{/inicio}"><i class="bi bi-shop"></i> Ver tienda</a>
        <a class="nav-link-admin" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
    </div>
</aside>

<main class="admin-main">
    <div class="admin-header">
        <div>
            <h1><i class="bi bi-phone me-2"></i>Productos</h1>
            <small class="text-muted" th:text="${productos.size() + ' productos registrados'}">0 productos</small>
        </div>
        <a class="btn btn-primary-perutec" th:href="@{/admin/productos/nuevo}">
            <i class="bi bi-plus-circle me-1"></i>Nuevo producto
        </a>
    </div>

    <div class="admin-card">
        <div class="filter-bar">
            <a class="btn btn-outline-secondary" th:href="@{/admin/productos}"
               th:classappend="${tipoSeleccionado == null or tipoSeleccionado == '' ? 'active' : ''}">
                Todos
            </a>
            <a class="btn btn-outline-secondary" th:href="@{/admin/productos?tipo=celular}"
               th:classappend="${tipoSeleccionado == 'celular' ? 'active' : ''}">
                <i class="bi bi-phone me-1"></i>Celulares
            </a>
            <a class="btn btn-outline-secondary" th:href="@{/admin/productos?tipo=tablet}"
               th:classappend="${tipoSeleccionado == 'tablet' ? 'active' : ''}">
                <i class="bi bi-tablet me-1"></i>Tablets
            </a>
            <a class="btn btn-outline-secondary" th:href="@{/admin/productos?tipo=wearable}"
               th:classappend="${tipoSeleccionado == 'wearable' ? 'active' : ''}">
                <i class="bi bi-smartwatch me-1"></i>Wearables
            </a>
        </div>

        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Nombre</th>
                    <th>Marca</th>
                    <th>Tipo</th>
                    <th>Precio</th>
                    <th class="text-center">Stock</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td>
                        <img class="thumb"
                             th:src="${#strings.startsWith(p.imagenUrl, 'http') or #strings.startsWith(p.imagenUrl, '/')} ? ${p.imagenUrl} : @{'/img/' + ${p.imagenUrl}}"
                             th:alt="${p.nombre}"
                             onerror="this.onerror=null; this.src='https://placehold.co/40x40/EEEEEE/999999?text=?';"/>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${p.nombre}">Nombre</div>
                        <small class="text-muted" th:text="${p.descripcion}">Desc</small>
                    </td>
                    <td th:text="${p.marca}">Marca</td>
                    <td>
                            <span class="badge-tipo"
                                  th:classappend="${p.tipo != null ? p.tipo.toString().toLowerCase() : ''}"
                                  th:text="${p.tipo}">Tipo</span>
                    </td>
                    <td class="fw-bold" th:text="'S/ ' + ${#numbers.formatDecimal(p.precio, 1, 2)}">S/ 0.00</td>
                    <td class="text-center">
                            <span class="badge"
                                  th:classappend="${p.cantidad > 5 ? 'bg-success' : (p.cantidad > 0 ? 'bg-warning text-dark' : 'bg-danger')}"
                                  th:text="${p.cantidad}">0</span>
                    </td>
                    <td class="text-center">
                        <a class="btn-action edit" th:href="@{/admin/productos/editar/{id}(id=${p.id})}" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/productos/eliminar/{id}(id=${p.id})}" method="post"
                              style="display:inline;"
                              onsubmit="return confirm('¿Eliminar definitivamente este producto?');">
                            <button type="submit" class="btn-action delete" title="Eliminar">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${productos.isEmpty()}" class="text-center text-muted py-4">
            <i class="bi bi-inbox d-block mb-2" style="font-size: 2.5rem; opacity: .5;"></i>
            <p class="mb-0">No hay productos en esta categoría.</p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
