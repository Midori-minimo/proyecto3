<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión — PeruTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="background: var(--gradiente-principal); min-height: 100vh; display: flex; align-items: center; padding-top: 0;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto" style="width: 420px; max-width: 90vw;">
            <div class="modal-content">
                <div class="modal-header" style="background: rgba(0,0,0,.2); color:#fff;">
                    <h5 class="modal-title"><i class="bi bi-person-circle me-2"></i>Tu cuenta PeruTec</h5>
                    <a th:href="@{/inicio}" class="btn-close btn-close-white"></a>
                </div>
                <div class="modal-body">
                    <div class="alert alert-perutec info" th:if="${param.registrado}">
                        <i class="bi bi-check-circle me-1"></i>Cuenta creada con éxito.
                    </div>
                    <div class="alert alert-perutec success" th:if="${param.recuperada}">
                        <i class="bi bi-check-circle me-1"></i>Contraseña actualizada.
                    </div>
                    <div class="alert alert-perutec danger" th:if="${param.error}">
                        <i class="bi bi-exclamation-triangle me-1"></i>Correo o contraseña incorrectos.
                    </div>
                    <div class="alert alert-perutec warning" th:if="${param.requiereLogin}">
                        <i class="bi bi-exclamation-triangle me-1"></i>Debes iniciar sesión para comprar.
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" name="username" class="form-control" required placeholder="tucorreo@ejemplo.com"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn-primario">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesión
                        </button>
                    </form>
                    <hr class="my-3"/>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/registro}" class="small text-decoration-none">Crear cuenta</a>
                        <a th:href="@{/recuperar-password}" class="small text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
