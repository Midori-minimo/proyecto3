<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión — Smartphones Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card-login {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            max-width: 420px;
            width: 100%;
        }
        .logo-login {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
        }
        .btn-login:hover { opacity: .9; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto">
            <div class="card card-login p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-phone-fill text-primary fs-1"></i>
                    <div class="logo-login mt-2">Smartphones Store</div>
                    <p class="text-muted small mb-0">Ingresa a tu cuenta</p>
                </div>

                <div th:if="${param.registrado}" class="alert alert-success py-2 small">
                    <i class="bi bi-check-circle me-1"></i>Cuenta creada con éxito. Ya puedes iniciar sesión.
                </div>
                <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Correo</label>
                        <input type="email" class="form-control" id="email" name="email"
                               th:value="${emailIngresado}" required placeholder="tucorreo@ejemplo.com"/>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required/>
                    </div>
                    <button type="submit" class="btn btn-login btn-primary w-100 py-2 fw-semibold text-white">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
                    </button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    ¿No tienes cuenta? <a th:href="@{/registro}" class="fw-semibold text-decoration-none">Regístrate aquí</a>
                </p>
                <p class="text-center mt-2 mb-0">
                    <a th:href="@{/inicio}" class="small text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Volver a la tienda sin iniciar sesión
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
