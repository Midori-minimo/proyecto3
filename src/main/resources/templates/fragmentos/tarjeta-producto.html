<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- grid -->
<div class="producto-card" th:fragment="tarjeta(prod)">
    <div class="producto-imagen">
        <img th:src="${#strings.startsWith(prod.imagenUrl, 'http') or #strings.startsWith(prod.imagenUrl, '/')} ? ${prod.imagenUrl} : @{'/img/' + ${prod.imagenUrl}}"
             th:alt="${prod.nombre}"
             onerror="this.onerror=null; this.src='https://placehold.co/300x300/EEEEEE/999999?text=Sin+imagen';"/>
    </div>
    <div class="producto-info">
        <div class="producto-nombre" th:text="${prod.nombre}">Nombre</div>
        <div class="producto-spec" th:text="${prod.descripcion}">Spec</div>
        <div class="producto-precio" th:text="'S/ ' + ${#numbers.formatDecimal(prod.precio, 1, 2)}">S/ 0.00</div>
        <button class="btn-comprar-card" type="button"
                th:attr="data-id=${prod.id}, data-nombre=${prod.nombre}, data-precio=${prod.precio}"
                th:disabled="${prod.cantidad == 0}"
                onclick="abrirModalCompra(this)">
            <span th:text="${prod.cantidad == 0} ? 'Sin stock' : 'Comprar'">Comprar</span>
        </button>
    </div>
</div>

</body>
</html>
