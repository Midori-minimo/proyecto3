<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Crear cuenta — PeruTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="background: var(--gradiente-principal); min-height: 100vh; display: flex; align-items: center; padding-top: 0;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto" style="width: 420px; max-width: 90vw;">
            <div class="modal-content">
                <div class="modal-header" style="background: rgba(0,0,0,.2); color:#fff;">
                    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Crear cuenta</h5>
                    <a th:href="@{/inicio}" class="btn-close btn-close-white"></a>
                </div>
                <div class="modal-body">
                    <div class="alert alert-perutec danger" th:if="${error}" th:text="${error}"></div>
                    <form th:action="@{/registro}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre completo</label>
                            <input type="text" name="nombre" class="form-control"
                                   th:value="${nombreIngresado}" required placeholder="Ej: Mario Ayme"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Correo</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${emailIngresado}" required placeholder="tucorreo@ejemplo.com"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" name="password" class="form-control"
                                   required minlength="6" placeholder="Mínimo 6 caracteres"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Confirmar contraseña</label>
                            <input type="password" name="confirmarPassword" class="form-control"
                                   required minlength="6"/>
                        </div>
                        <button type="submit" class="btn-primario">
                            <i class="bi bi-check-circle me-1"></i>Crear cuenta
                        </button>
                    </form>
                    <hr class="my-3"/>
                    <div class="text-center">
                        <a th:href="@{/login}" class="small text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
