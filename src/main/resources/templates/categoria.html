<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:authorization="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${tipoNombre} + ' — PeruTec'">Categoría — PeruTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- flexbox -->
<div th:replace="~{fragmentos/navbar :: navbar}"></div>

<main>
    <div class="container-app">

        <div class="seccion-titulo">
            <span th:text="${tipoNombre}">Categoría</span>
            <a class="ver-todo" th:href="@{/inicio}"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
        </div>

        <button class="btn-toggle-filtros" type="button" onclick="toggleFiltros()">
            <i class="bi bi-funnel-fill"></i>Mostrar filtros
        </button>

        <!-- grid -->
        <div class="categoria-layout">
            <div class="categoria-contenido">

                <th:block th:if="${productosPorMarca != null and !productosPorMarca.isEmpty()}"
                          th:each="entrada : ${productosPorMarca}">
                    <div class="marca-bloque">
                        <h3 class="marca-titulo" th:text="${entrada.key}">Marca</h3>
                        <!-- carrusel -->
                        <div class="marca-carrusel">
                            <div class="marca-track">
                                <th:block th:each="p : ${entrada.value}">
                                    <div th:replace="~{fragmentos/tarjeta-producto :: tarjeta(prod=${p})}"></div>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </th:block>

                <div th:if="${productosPorMarca == null or productosPorMarca.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-inbox d-block" style="font-size: 4rem; color: #ccc;"></i>
                    <p class="text-muted mt-3">No hay productos en esta categoría todavía.</p>
                </div>

            </div>

            <div th:if="${productosPorMarca != null and !productosPorMarca.isEmpty()}">
                <div th:replace="~{fragmentos/filtros :: filtros(marcas=${marcas}, precioMin=${precioMin}, precioMax=${precioMax})}"></div>
            </div>
        </div>

    </div>
</main>

<!-- grid -->
<div th:replace="~{fragmentos/footer :: footer}"></div>

<!-- modal -->
<div th:replace="~{fragmentos/modales :: modales}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    window.USUARIO_LOGUEADO_GLOBAL = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
</script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>
