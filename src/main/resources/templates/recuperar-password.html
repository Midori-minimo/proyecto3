<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recuperar contraseña — Smartphones Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card-login {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            max-width: 420px;
            width: 100%;
        }
        .logo-login {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
        }
        .btn-login:hover { opacity: .9; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto">
            <div class="card card-login p-4 p-md-5">

                <!-- ════════ PASO 1: pedir el correo ════════ -->
                <th:block th:if="${paso == null or paso == 1}">
                    <div class="text-center mb-4">
                        <i class="bi bi-key-fill text-primary fs-1"></i>
                        <div class="logo-login mt-2">Recuperar contraseña</div>
                        <p class="text-muted small mb-0">Ingresa tu correo y te ayudaremos a crear una nueva</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                    <form th:action="@{/recuperar-password}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Correo registrado</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   th:value="${emailIngresado}" required
                                   placeholder="tucorreo@ejemplo.com"/>
                        </div>
                        <button type="submit" class="btn btn-login btn-primary w-100 py-2 fw-semibold text-white">
                            <i class="bi bi-arrow-repeat me-1"></i>Continuar
                        </button>
                    </form>
                </th:block>

                <!-- ════════ PASO 2: ingresar la nueva contraseña ════════ -->
                <th:block th:if="${paso == 2}">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
                        <div class="logo-login mt-2">Nueva contraseña</div>
                        <p class="text-muted small mb-0">
                            Cuenta: <span class="fw-semibold text-dark" th:text="${email}">correo@ejemplo.com</span>
                        </p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                    <form th:action="@{/recuperar-password}" method="post">
                        <!-- El correo y el paso viajan ocultos para saber qué hacer en el POST -->
                        <input type="hidden" name="paso" value="2"/>
                        <input type="hidden" name="email" th:value="${email}"/>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Nueva contraseña</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   required minlength="6" placeholder="Mínimo 6 caracteres"/>
                        </div>
                        <div class="mb-4">
                            <label for="confirmarPassword" class="form-label fw-semibold">Confirmar contraseña</label>
                            <input type="password" class="form-control" id="confirmarPassword" name="confirmarPassword"
                                   required minlength="6"/>
                        </div>
                        <button type="submit" class="btn btn-login btn-primary w-100 py-2 fw-semibold text-white">
                            <i class="bi bi-check-circle me-1"></i>Actualizar contraseña
                        </button>
                    </form>
                </th:block>

                <p class="text-center mt-3 mb-0">
                    <a th:href="@{/login}" class="small text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Volver a iniciar sesión
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
