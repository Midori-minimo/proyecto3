<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recuperar contraseña — PeruTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="background: var(--gradiente-principal); min-height: 100vh; display: flex; align-items: center; padding-top: 0;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto" style="width: 420px; max-width: 90vw;">
            <div class="modal-content">
                <div class="modal-header" style="background: rgba(0,0,0,.2); color:#fff;">
                    <h5 class="modal-title">
                        <i class="bi bi-key me-2"></i>
                        <span th:if="${paso == null or paso == 1}">Recuperar contraseña</span>
                        <span th:if="${paso == 2}">Nueva contraseña</span>
                    </h5>
                    <a th:href="@{/login}" class="btn-close btn-close-white"></a>
                </div>
                <div class="modal-body">
                    <div class="alert alert-perutec danger" th:if="${error}" th:text="${error}"></div>

                    <form th:if="${paso == null or paso == 1}" th:action="@{/recuperar-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Correo registrado</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${emailIngresado}" required placeholder="tucorreo@ejemplo.com"/>
                        </div>
                        <button type="submit" class="btn-primario">
                            <i class="bi bi-arrow-repeat me-1"></i>Continuar
                        </button>
                    </form>

                    <form th:if="${paso == 2}" th:action="@{/recuperar-password}" method="post">
                        <input type="hidden" name="paso" value="2"/>
                        <input type="hidden" name="email" th:value="${email}"/>
                        <p class="text-muted small">
                            Cuenta: <span class="fw-semibold text-dark" th:text="${email}">correo@ejemplo.com</span>
                        </p>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nueva contraseña</label>
                            <input type="password" name="password" class="form-control"
                                   required minlength="6" placeholder="Mínimo 6 caracteres"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Confirmar contraseña</label>
                            <input type="password" name="confirmarPassword" class="form-control"
                                   required minlength="6"/>
                        </div>
                        <button type="submit" class="btn-primario">
                            <i class="bi bi-check-circle me-1"></i>Actualizar contraseña
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
